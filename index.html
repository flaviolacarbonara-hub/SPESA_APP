<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpesApp – Lista della Spesa</title>
  <meta name="description" content="Gestisci la lista della spesa per più supermercati in modo semplice e veloce." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <style>
    /* ====================================================
       RESET & BASE
    ==================================================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 15px; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0e0e0d;
      color: #f0ede6;
      min-height: 100dvh;
      overflow-x: hidden;
      line-height: 1.55;
    }
    button { cursor: pointer; font-family: inherit; border: none; outline: none; background: none; }
    input { font-family: inherit; outline: none; border: none; background: none; }
    svg { display: block; flex-shrink: 0; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a28; border-radius: 99px; }

    /* ====================================================
       VIEW SYSTEM — Spesa view slides in from right
    ==================================================== */
    #view-spesa {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: #0e0e0d;
      transform: translateX(100%);
      transition: transform 0.42s cubic-bezier(0.77, 0, 0.18, 1);
      overflow-y: auto;
      overflow-x: hidden;
    }
    #view-spesa.active { transform: translateX(0); }

    /* ====================================================
       SHARED HEADER
    ==================================================== */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(14, 14, 13, 0.94);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .header-row {
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 20px;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    /* ====================================================
       LOGO
    ==================================================== */
    .app-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-icon {
      width: 38px; height: 38px; border-radius: 10px;
      background: linear-gradient(135deg, #1d6ad4 0%, #1240a0 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .logo-words { line-height: 1.15; }
    .logo-words strong { display: block; font-size: 17px; font-weight: 800; color: #f0ede6; letter-spacing: -0.02em; }
    .logo-words small { font-size: 10px; font-weight: 500; color: #5a5856; letter-spacing: 0.1em; text-transform: uppercase; }

    /* ====================================================
       HEADER CONTROLS
    ==================================================== */
    .spacer { flex: 1; }

    .badge {
      padding: 5px 13px; border-radius: 99px;
      font-size: 12px; font-weight: 600;
      background: rgba(255,255,255,0.05);
      color: #6b6864;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .badge.active {
      background: rgba(29, 106, 212, 0.18);
      color: #74aff7;
    }

    .btn-cta {
      display: flex; align-items: center; gap: 7px;
      padding: 10px 20px; border-radius: 12px;
      background: linear-gradient(135deg, #1d6ad4, #1240a0);
      color: #fff; font-size: 13px; font-weight: 700;
      letter-spacing: 0.01em; white-space: nowrap;
      box-shadow: 0 4px 16px rgba(29,106,212,0.35);
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s;
    }
    .btn-cta:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(29,106,212,0.45);
    }
    .btn-cta:active:not(:disabled) { transform: translateY(0); }
    .btn-cta:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ====================================================
       TOOLBAR
    ==================================================== */
    .toolbar {
      max-width: 1120px;
      margin: 26px auto 0;
      padding: 0 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .search-wrap { flex: 1; min-width: 200px; position: relative; }
    .srch-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: #5a5856; pointer-events: none; }
    #search-input {
      width: 100%; padding: 11px 14px 11px 40px;
      background: #1a1a18; border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px; color: #f0ede6; font-size: 14px;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    #search-input::placeholder { color: #5a5856; }
    #search-input:focus { border-color: #1d6ad4; box-shadow: 0 0 0 3px rgba(29,106,212,0.14); }

    .toggle-pill {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; border-radius: 12px;
      background: #1a1a18; border: 1px solid rgba(255,255,255,0.07);
      cursor: pointer; user-select: none; white-space: nowrap;
      transition: border-color 0.18s;
    }
    .toggle-pill:hover { border-color: rgba(255,255,255,0.13); }
    .t-track {
      width: 38px; height: 20px; border-radius: 99px;
      background: #2c2c2a; position: relative;
      transition: background 0.2s; flex-shrink: 0;
    }
    .t-track.on { background: #1d6ad4; }
    .t-thumb {
      width: 14px; height: 14px; border-radius: 50%;
      background: #fff; position: absolute; top: 3px; left: 3px;
      transition: left 0.2s ease; box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }
    .t-track.on .t-thumb { left: 21px; }
    .toggle-pill span { font-size: 13px; font-weight: 500; color: #a09d96; }

    /* ====================================================
       SECTION DIVIDER
    ==================================================== */
    .section-row {
      max-width: 1120px; margin: 22px auto 16px; padding: 0 20px;
      display: flex; align-items: center; gap: 12px;
    }
    .section-label { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #5a5856; white-space: nowrap; }
    .section-line { flex: 1; height: 1px; background: rgba(255,255,255,0.06); }

    /* ====================================================
       GRID
    ==================================================== */
    .main-wrap { max-width: 1120px; margin: 0 auto 80px; padding: 0 20px; }
    #sm-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 18px;
    }

    /* ====================================================
       SUPERMARKET CARD
    ==================================================== */
    .sm-card {
      border-radius: 22px; overflow: hidden;
      background: #191917;
      border: 1px solid rgba(255,255,255,0.07);
      box-shadow: 0 6px 30px rgba(0,0,0,0.45);
      display: flex; flex-direction: column;
      transition: border-color 0.2s, box-shadow 0.2s;
      animation: cardIn 0.32s ease both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .sm-card:hover { border-color: rgba(255,255,255,0.12); box-shadow: 0 10px 40px rgba(0,0,0,0.55); }

    /* --- CARD HEADER (brand styled) --- */
    .card-header {
      padding: 18px 18px 16px;
      display: flex; align-items: center; gap: 14px;
      cursor: pointer; position: relative; overflow: hidden;
      /* brand colors applied via data-brand */
    }
    .card-header::after {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 80% 0%, rgba(255,255,255,0.10), transparent 65%);
      pointer-events: none;
    }

    /* Brand color gradients */
    [data-brand="eurospin"] .card-header { background: linear-gradient(135deg, #0057A8 0%, #003d7a 100%); }
    [data-brand="lidl"]     .card-header { background: linear-gradient(135deg, #0050AA 0%, #003480 100%); }
    [data-brand="tigota"]   .card-header { background: linear-gradient(135deg, #00A99D 0%, #007770 100%); }
    [data-brand="md"]       .card-header { background: linear-gradient(135deg, #003DA5 0%, #00256e 100%); }
    [data-brand="custom"]   .card-header { background: linear-gradient(135deg, #2e2e2c 0%, #1c1c1a 100%); }

    .card-logo {
      width: 52px; height: 52px; border-radius: 12px;
      overflow: hidden; flex-shrink: 0;
      background: rgba(255,255,255,0.12);
      display: flex; align-items: center; justify-content: center;
    }
    .card-logo svg { width: 52px; height: 52px; }

    .card-header-info { flex: 1; min-width: 0; }
    .card-header-name {
      font-size: 20px; font-weight: 800; color: #fff;
      letter-spacing: -0.02em; line-height: 1.1;
    }
    .card-header-sub {
      font-size: 12px; color: rgba(255,255,255,0.55);
      margin-top: 3px; font-weight: 400;
    }

    .card-header-btns { display: flex; gap: 5px; position: relative; z-index: 1; }
    .hdr-btn {
      width: 30px; height: 30px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.55);
      background: rgba(255,255,255,0.1);
      transition: background 0.15s, color 0.15s;
    }
    .hdr-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }
    .hdr-btn.del:hover { background: rgba(220, 50, 50, 0.25); color: #fd7070; }
    .chevron {
      color: rgba(255,255,255,0.5);
      transition: transform 0.3s ease, color 0.15s;
      flex-shrink: 0; margin-left: 2px;
    }
    .chevron.open { transform: rotate(180deg); }

    /* --- CARD BODY (collapsible) --- */
    .card-body {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.38s cubic-bezier(0.4,0,0.2,1);
    }
    .card-body.open { max-height: 9999px; }

    /* Quick add row */
    .add-row {
      display: flex; gap: 8px;
      padding: 12px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .add-row input {
      flex: 1; padding: 9px 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px; color: #f0ede6; font-size: 13px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .add-row input::placeholder { color: #5a5856; }
    .add-row input:focus {
      border-color: rgba(29,106,212,0.5);
      box-shadow: 0 0 0 2px rgba(29,106,212,0.1);
    }
    .btn-add-p {
      padding: 9px 14px; border-radius: 8px;
      background: rgba(34,197,94,0.12);
      color: #4ade80; font-size: 13px; font-weight: 600;
      display: flex; align-items: center; gap: 5px;
      border: 1px solid rgba(34,197,94,0.2);
      white-space: nowrap;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-add-p:hover { background: rgba(34,197,94,0.2); transform: translateY(-1px); }

    /* Product list */
    .prod-list { padding: 6px 0; }
    .prod-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 15px; border-radius: 8px;
      transition: background 0.15s, opacity 0.25s;
      animation: itemIn 0.22s ease both;
      margin: 1px 6px;
    }
    @keyframes itemIn {
      from { opacity: 0; transform: translateX(-6px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .prod-item:hover { background: rgba(255,255,255,0.03); }
    /* checked = selezionato per la spesa → evidenziato in verde */
    .prod-item.checked { background: rgba(22,163,74,0.07); }

    .cbox {
      width: 22px; height: 22px; border-radius: 6px;
      border: 2px solid rgba(255,255,255,0.16);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .cbox:hover { border-color: rgba(255,255,255,0.3); }
    .cbox.on { background: #16a34a; border-color: #16a34a; }
    .cbox-svg { display: none; pointer-events: none; }
    .cbox.on .cbox-svg { display: block; }

    .prod-name {
      flex: 1; font-size: 14px; font-weight: 500; color: #f0ede6;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      transition: color 0.2s;
    }
    /* nome verde tenue se selezionato */
    .prod-item.checked .prod-name { color: #86efac; }

    .btn-del-p {
      width: 26px; height: 26px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      color: #5a5856; opacity: 0;
      transition: opacity 0.15s, background 0.15s, color 0.15s;
    }
    .prod-item:hover .btn-del-p { opacity: 1; }
    .btn-del-p:hover { background: rgba(220,50,50,0.12); color: #fd7070; }

    .no-prod { padding: 22px 15px; text-align: center; font-size: 13px; color: #5a5856; }

    /* Card footer */
    .card-footer {
      padding: 12px 16px; border-top: 1px solid rgba(255,255,255,0.05);
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    .footer-stat { font-size: 12px; color: #5a5856; }
    .footer-stat strong { color: #a09d96; }

    /* Add supermarket button */
    .btn-new-sm {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 18px; border-radius: 18px; width: 100%;
      border: 2px dashed rgba(255,255,255,0.09);
      color: #5a5856; font-size: 14px; font-weight: 500;
      transition: border-color 0.18s, color 0.18s, background 0.18s;
    }
    .btn-new-sm:hover {
      border-color: rgba(255,255,255,0.18);
      color: #a09d96; background: rgba(255,255,255,0.02);
    }

    /* Empty state */
    .empty-state {
      grid-column: 1 / -1; text-align: center; padding: 80px 20px;
    }
    .empty-emoji { font-size: 64px; margin-bottom: 18px; display: block; opacity: 0.4; }
    .empty-state h2 { font-size: 22px; color: #a09d96; margin-bottom: 8px; }
    .empty-state p { font-size: 14px; color: #5a5856; }

    /* ====================================================
       VIEW 2 — SPESA SCREEN
    ==================================================== */
    .spesa-header .header-row { height: 60px; }

    .btn-back {
      display: flex; align-items: center; gap: 6px;
      color: #a09d96; font-size: 14px; font-weight: 600;
      padding: 8px 12px; border-radius: 10px;
      transition: background 0.15s, color 0.15s;
    }
    .btn-back:hover { background: rgba(255,255,255,0.05); color: #f0ede6; }

    .spesa-title-area { flex: 1; text-align: center; }
    .spesa-title { font-size: 15px; font-weight: 700; color: #f0ede6; }
    .spesa-progress-txt { font-size: 12px; color: #5a5856; margin-top: 1px; }

    .btn-reset {
      padding: 7px 14px; border-radius: 10px;
      background: rgba(255,255,255,0.05);
      color: #a09d96; font-size: 12px; font-weight: 600;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }
    .btn-reset:hover { background: rgba(255,255,255,0.09); color: #f0ede6; }

    /* Progress bar */
    .pbar-wrap {
      height: 3px; background: rgba(255,255,255,0.06);
    }
    .pbar-fill {
      height: 100%;
      background: linear-gradient(90deg, #1d6ad4, #10b981);
      border-radius: 99px;
      transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    }

    /* Shopping page content */
    .spesa-content {
      max-width: 680px; margin: 24px auto 100px; padding: 0 20px;
    }

    .shop-section {
      margin-bottom: 20px; border-radius: 22px; overflow: hidden;
      background: #191917; border: 1px solid rgba(255,255,255,0.07);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      animation: cardIn 0.28s ease both;
    }
    .shop-sec-hdr {
      padding: 14px 18px;
      display: flex; align-items: center; gap: 12px;
      position: relative; overflow: hidden;
    }
    .shop-sec-hdr::after {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 80% 0%, rgba(255,255,255,0.08), transparent 60%);
      pointer-events: none;
    }
    [data-brand="eurospin"] .shop-sec-hdr { background: linear-gradient(135deg, #0057A8, #003d7a); }
    [data-brand="lidl"]     .shop-sec-hdr { background: linear-gradient(135deg, #0050AA, #003480); }
    [data-brand="tigota"]   .shop-sec-hdr { background: linear-gradient(135deg, #00A99D, #007770); }
    [data-brand="md"]       .shop-sec-hdr { background: linear-gradient(135deg, #003DA5, #00256e); }
    [data-brand="custom"]   .shop-sec-hdr { background: linear-gradient(135deg, #2e2e2c, #1c1c1a); }

    .shop-logo {
      width: 38px; height: 38px; border-radius: 9px; overflow: hidden;
      flex-shrink: 0; background: rgba(255,255,255,0.12);
      display: flex; align-items: center; justify-content: center;
    }
    .shop-logo svg { width: 38px; height: 38px; }

    .shop-sec-name { font-size: 16px; font-weight: 800; color: #fff; letter-spacing: -0.01em; }
    .shop-sec-count { margin-left: auto; font-size: 12px; color: rgba(255,255,255,0.5); font-weight: 500; }

    .shop-prod {
      display: flex; align-items: center; gap: 14px;
      padding: 15px 18px;
      border-top: 1px solid rgba(255,255,255,0.05);
      cursor: pointer;
      transition: background 0.15s;
    }
    .shop-prod:hover { background: rgba(255,255,255,0.03); }
    .shop-prod.done { opacity: 0.35; }

    .shop-cbox {
      width: 26px; height: 26px; border-radius: 8px;
      border: 2px solid rgba(255,255,255,0.16);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
    }
    .shop-prod.done .shop-cbox { background: #16a34a; border-color: #16a34a; }

    .shop-prod-name {
      flex: 1; font-size: 15px; font-weight: 500; color: #f0ede6;
      transition: color 0.2s, text-decoration 0.15s;
    }
    .shop-prod.done .shop-prod-name { text-decoration: line-through; color: #5a5856; }

    /* All done banner */
    .all-done {
      text-align: center; padding: 60px 20px;
    }
    .all-done-icon { font-size: 76px; display: block; margin-bottom: 18px; animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes popIn { from { transform: scale(0.4); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .all-done h2 { font-family: 'Playfair Display', serif; font-size: 28px; color: #f0ede6; margin-bottom: 8px; }
    .all-done p { color: #5a5856; font-size: 15px; }

    /* Empty spesa */
    .spesa-empty { text-align: center; padding: 80px 20px; }
    .spesa-empty-icon { font-size: 64px; display: block; margin-bottom: 18px; opacity: 0.45; }
    .spesa-empty h2 { font-size: 22px; color: #a09d96; margin-bottom: 8px; }
    .spesa-empty p { font-size: 14px; color: #5a5856; }

    /* ====================================================
       MODALS
    ==================================================== */
    .m-overlay {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.22s ease;
    }
    .m-overlay.open { opacity: 1; pointer-events: all; }
    .m-box {
      background: #1e1e1c;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px; padding: 28px 28px 24px;
      max-width: 420px; width: 100%;
      box-shadow: 0 24px 64px rgba(0,0,0,0.8);
      transform: scale(0.88) translateY(24px);
      opacity: 0;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.22s ease;
    }
    .m-overlay.open .m-box { transform: scale(1) translateY(0); opacity: 1; }
    .m-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .m-title { font-family: 'Playfair Display', serif; font-size: 21px; font-weight: 700; color: #f0ede6; }
    .m-close {
      width: 30px; height: 30px; border-radius: 8px;
      background: rgba(255,255,255,0.06); color: #a09d96;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .m-close:hover { background: rgba(255,255,255,0.11); }
    .m-label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #a09d96; margin-bottom: 7px; }
    .m-input {
      width: 100%; padding: 12px 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 12px; color: #f0ede6; font-size: 14px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .m-input::placeholder { color: #5a5856; }
    .m-input:focus { border-color: #1d6ad4; box-shadow: 0 0 0 3px rgba(29,106,212,0.12); }
    .m-err { font-size: 12px; color: #fd7070; margin-top: 7px; display: none; }
    .m-err.show { display: block; }
    .m-text { font-size: 15px; color: #a09d96; line-height: 1.6; }
    .m-text strong { color: #f0ede6; }
    .m-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
    .btn-cancel-m {
      padding: 10px 20px; border-radius: 10px;
      background: rgba(255,255,255,0.05); color: #a09d96;
      font-size: 14px; font-weight: 500;
      transition: background 0.15s, color 0.15s;
    }
    .btn-cancel-m:hover { background: rgba(255,255,255,0.09); color: #f0ede6; }
    .btn-ok-m {
      padding: 10px 22px; border-radius: 10px;
      background: #1d6ad4; color: #fff;
      font-size: 14px; font-weight: 600;
      transition: background 0.15s, transform 0.1s;
    }

    #toasts {

      display: flex; flex-direction: column; gap: 8px; pointer-events: none;
    }
    .toast {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; border-radius: 12px;
      background: #2a2a28; border: 1px solid rgba(255,255,255,0.1);
      font-size: 13px; font-weight: 500; color: #f0ede6;
      box-shadow: 0 6px 24px rgba(0,0,0,0.5);
      animation: toastIn 0.3s ease both;
      max-width: 290px;
    }
    .toast.out { animation: toastOut 0.3s ease both; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(16px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes toastOut { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(16px); } }
    .t-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .toast.ok .t-dot   { background: #4ade80; }
    .toast.bad .t-dot  { background: #fd7070; }
    .toast.info .t-dot { background: #74aff7; }

    /* ====================================================
       RESPONSIVE
    ==================================================== */
    @media (max-width: 640px) {
      #sm-grid { grid-template-columns: 1fr; }
      .logo-words small { display: none; }
      .badge { display: none; }
      .btn-cta span { display: none; }
    }
  </style>

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadState() || makeDefaults();

/* ============================================================
   SEARCH / FILTER STATE
============================================================ */
let searchQ    = '';
let hideChecked = false;

/* ============================================================
   HELPERS
============================================================ */
function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function totalProducts() {
  return Object.values(state).reduce((s, sm) => s + sm.products.length, 0);
}

function brandOf(sm) {
  return sm.brand || 'custom';
}

function logoSvg(brand) {
  return BRAND_LOGOS[brand] || BRAND_LOGOS.custom;
}

/* ============================================================
   RENDER — LISTA VIEW
============================================================ */
function render() {
  renderGrid();
  updateBadge();
}

function renderGrid() {
  const grid = document.getElementById('sm-grid');
  const q    = searchQ.toLowerCase().trim();
  const smEntries = Object.entries(state);

  // Count label
  const cnt = smEntries.length;
  document.getElementById('sm-count-lbl').textContent =
    cnt === 0 ? '—' : cnt + (cnt === 1 ? ' negozio' : ' negozi');

  if (cnt === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <span class="empty-emoji">🛒</span>
        <h2>Nessun supermercato</h2>
        <p>Aggiungi il primo usando il pulsante in basso.</p>
      </div>
      <button class="btn-new-sm" id="btn-new-sm-inline">

  let html = '';
  let anyVisible = false;

  smEntries.forEach(([smId, sm]) => {

    // Filter products
    let prods = sm.products.filter(p => {
      const matchQ    = !q || p.name.toLowerCase().includes(q);
      const matchHide = !hideChecked || !p.checked;
      return matchQ && matchHide;
    });

    if (q && prods.length === 0) return;
    anyVisible = true;

    const isOpen  = !sm.collapsed;
    const total   = sm.products.length;
    const checked = sm.products.filter(p => p.checked).length;

    /* Product items */
    let prodsHtml = prods.length > 0
      ? prods.map(p => `
          <div class="prod-item${p.checked ? ' checked' : ''}" data-pid="${p.id}" data-smid="${smId}">
            <div class="cbox${p.checked ? ' on' : ''}" data-act="toggle" data-pid="${p.id}" data-smid="${smId}" role="checkbox" aria-checked="${p.checked}" tabindex="0">
              <svg class="cbox-svg" width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><polyline points="2 6 5 9 10 3"/></svg>
            </div>

              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            </button>
          </div>`)
        .join('')
      : `<div class="no-prod">${q ? 'Nessun prodotto trovato.' : 'Nessun prodotto. Aggiungine uno!'}</div>`;

    html += `
      <div class="sm-card" data-brand="${brand}" id="card-${smId}">
        <div class="card-header" data-act="toggle-card" data-smid="${smId}" role="button" aria-expanded="${isOpen}" tabindex="0">
          <div class="card-logo">${logoSvg(brand)}</div>
          <div class="card-header-info">
            <div class="card-header-name">${esc(sm.name)}</div>
            <div class="card-header-sub">${total} prodott${total === 1 ? 'o' : 'i'} · <span style="color:#86efac">${checked} selezionat${checked === 1 ? 'o' : 'i'}</span></div>
          </div>
          <div class="card-header-btns">
            <button class="hdr-btn" data-act="edit-sm" data-smid="${smId}" title="Rinomina" aria-label="Rinomina ${esc(sm.name)}">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>
            </button>
            <button class="hdr-btn del" data-act="del-sm" data-smid="${smId}" title="Elimina" aria-label="Elimina ${esc(sm.name)}">

            <button class="btn-add-p" data-act="add-prod" data-smid="${smId}">

  if (!anyVisible && q) {
    grid.innerHTML = `
      <div class="empty-state">
        <span class="empty-emoji">🔍</span>
        <h2>Nessun risultato</h2>
        <p>Nessun prodotto trovato per "${esc(q)}".</p>
      </div>`;
    return;
  }

  grid.innerHTML = html;
  document.getElementById('btn-new-sm-inline')?.addEventListener('click', openNewSm);

============================================================ */
function updateBadge() {
  /* Il badge mostra quanti prodotti sono stati SELEZIONATI (checked) */
  const selected = Object.values(state).reduce((s, sm) => s + sm.products.filter(p => p.checked).length, 0);
  const badge = document.getElementById('prod-badge');
  const btn   = document.getElementById('btn-goto-spesa');
  if (selected === 0) {
    badge.textContent = 'Nessun prodotto selezionato';
    badge.classList.remove('active');
    btn.disabled = true;
  } else {
    badge.textContent = selected + (selected === 1 ? ' prodotto nel carrello' : ' prodotti nel carrello');
    badge.classList.add('active');
    btn.disabled = false;
  }
}

/* ============================================================
   RENDER — SPESA VIEW
============================================================ */
function renderSpesa() {
  const el = document.getElementById('shopping-list');

  /* Solo i supermercati con almeno un prodotto SELEZIONATO (checked) */
  const smEntries = Object.entries(state).filter(([, sm]) => sm.products.some(p => p.checked));

  if (smEntries.length === 0) {
    el.innerHTML = `
      <div class="spesa-empty">
        <span class="spesa-empty-icon">☑️</span>
        <h2>Nessun prodotto selezionato</h2>
        <p>Torna alla lista e spunta i prodotti che vuoi acquistare.</p>
      </div>`;
    updateSpesaProgress();
    return;
  }

  /* Tutti i prodotti selezionati */
  const allSelected = smEntries.flatMap(([, sm]) => sm.products.filter(p => p.checked));
  const allPicked   = allSelected.every(p => p.picked);

  /* Banner «tutto preso» */
  if (allPicked && allSelected.length > 0) {
    el.innerHTML = `
      <div class="all-done">
        <span class="all-done-icon">🎉</span>
        <h2>Spesa completata!</h2>
        <p>Hai preso tutto! Premi "Reset" per riiniziare il giro.</p>
      </div>`;
    updateSpesaProgress();
    return;
  }

  let html = '';
  smEntries.forEach(([smId, sm]) => {
    const brand      = brandOf(sm);
    /* Mostra solo i prodotti selezionati */
    const prods      = sm.products.filter(p => p.checked);
    const pickedCount = prods.filter(p => p.picked).length;

    const prodsHtml = prods.map(p => `
      <div class="shop-prod${p.picked ? ' done' : ''}" data-act="shop-toggle" data-pid="${p.id}" data-smid="${smId}" role="checkbox" aria-checked="${!!p.picked}" tabindex="0">
        <div class="shop-cbox">
          ${p.picked ? `<svg width="13" height="13" viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><polyline points="2 6 5 9 10 3"/></svg>` : ''}
        </div>
        <span class="shop-prod-name">${esc(p.name)}</span>
      </div>`).join('');

    html += `
      <div class="shop-section" data-brand="${brand}">
        <div class="shop-sec-hdr">
          <div class="shop-logo">${logoSvg(brand)}</div>
          <span class="shop-sec-name">${esc(sm.name)}</span>
          <span class="shop-sec-count">${pickedCount}/${prods.length}</span>
        </div>
        ${prodsHtml}
      </div>`;
  });

  el.innerHTML = html;
  updateSpesaProgress();
}

function updateSpesaProgress() {
  /* Progresso = quanti dei prodotti SELEZIONATI sono stati presi (picked) */
  const selected = Object.values(state).flatMap(sm => sm.products.filter(p => p.checked));
  const total    = selected.length;
  const picked   = selected.filter(p => p.picked).length;
  const pct      = total > 0 ? (picked / total) * 100 : 0;

  document.getElementById('pbar').style.width = pct + '%';
  document.getElementById('spesa-prog-txt').textContent =
    total === 0 ? 'Nessun prodotto' : `${picked} di ${total} presi`;
}

  /* Reset solo il campo «picked» — i prodotti restano selezionati */
  Object.values(state).forEach(sm => sm.products.forEach(p => p.picked = false));
  saveState();
  renderSpesa();
  toast('↩ Segni di presa azzerati', 'info');

/* ============================================================
   EVENT DELEGATION — GRID (lista view)
============================================================ */
document.getElementById('sm-grid').addEventListener('click', function(e) {
  const t = e.target.closest('[data-act]');
  if (!t) return;
  const act  = t.dataset.act;
  const smid = t.dataset.smid;
  const pid  = t.dataset.pid;

  e.stopPropagation();

  if (act === 'toggle-card') {
    state[smid].collapsed = !state[smid].collapsed;
    saveState(); render(); return;
  }
  if (act === 'edit-sm')   { openEditSm(smid); return; }
  if (act === 'del-sm')    { openDelSm(smid);  return; }
  if (act === 'toggle')    { toggleProduct(smid, pid); return; }
  if (act === 'del-prod')  { deleteProduct(smid, pid); return; }
  if (act === 'add-prod')  { addProductQuick(smid);    return; }
});

/* Keyboard on grid */
document.getElementById('sm-grid').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const t = e.target.closest('[data-act]');
    if (!t) return;
    if (t.classList.contains('qname')) {
      addProductQuick(t.dataset.smid, t.closest('.add-row'));
    } else {
      t.click();
    }
  }
  if (e.key === ' ' && e.target.classList.contains('cbox')) {
    e.preventDefault(); e.target.click();
  }
});

   EVENT DELEGATION — SHOPPING VIEW
============================================================ */
document.getElementById('shopping-list').addEventListener('click', function(e) {
  const t = e.target.closest('[data-act="shop-toggle"]');
  if (!t) return;
  const smid = t.dataset.smid;
  const pid  = t.dataset.pid;

  pickProduct(smid, pid);
});

  if (e.key === 'Enter' || e.key === ' ') {
    const t = e.target.closest('[data-act="shop-toggle"]');
    if (t) { e.preventDefault(); t.click(); }

});

/* ============================================================
   PRODUCT ACTIONS
============================================================ */
function addProductQuick(smid, row) {
  if (!row) {
    const card = document.getElementById('card-' + smid);
    if (!card) return;
    row = card.querySelector('.add-row');
  }
  const inp  = row.querySelector('.qname');
  const name = inp.value.trim();

  if (!name) {
    inp.style.borderColor = 'rgba(253,112,112,0.6)';
    setTimeout(() => inp.style.borderColor = '', 1500);
    inp.focus();
    toast('⚠ Inserisci il nome del prodotto', 'bad');
    return;
  }

  state[smid].products.push({ id: uid(), name, checked: false, picked: false });
  saveState();
  render();
  toast(`✓ "${name}" aggiunto`, 'ok');
}

/* Seleziona/deseleziona un prodotto nella LISTA (lo aggiunge/rimuove dal carrello) */
function toggleProduct(smid, pid) {
  const prod = state[smid]?.products.find(p => p.id === pid);
  if (!prod) return;
  prod.checked = !prod.checked;
  /* Se si deseleziona, azzera anche picked */
  if (!prod.checked) prod.picked = false;
  saveState();
  render();
  toast(prod.checked ? '🛒 Aggiunto al carrello' : '↩ Rimosso dal carrello', 'info');
}

/* Segna come preso/non preso nel CARRELLO (durante la spesa) */
function pickProduct(smid, pid) {
  const prod = state[smid]?.products.find(p => p.id === pid);
  if (!prod) return;
  prod.picked = !prod.picked;
  saveState();
  renderSpesa();
  toast(prod.picked ? '✓ Preso!' : '↩ Rimesso', 'info');
}

function deleteProduct(smid, pid) {
  const sm  = state[smid];
  const idx = sm.products.findIndex(p => p.id === pid);
  if (idx === -1) return;
  const name = sm.products[idx].name;
  sm.products.splice(idx, 1);
  saveState();
  render();
  toast(`🗑 "${name}" eliminato`, 'bad');
}

============================================================ */
let editingSmId = null;

function openNewSm() {
  editingSmId = null;
  document.getElementById('msm-title').textContent = 'Nuovo supermercato';
  document.getElementById('msm-input').value = '';
  document.getElementById('msm-err').classList.remove('show');
  openModal('modal-sm');
  setTimeout(() => document.getElementById('msm-input').focus(), 120);
}

function openEditSm(smId) {
  editingSmId = smId;
  document.getElementById('msm-title').textContent = 'Rinomina supermercato';
  document.getElementById('msm-input').value = state[smId].name;
  document.getElementById('msm-err').classList.remove('show');
  openModal('modal-sm');
  setTimeout(() => { const i = document.getElementById('msm-input'); i.focus(); i.select(); }, 120);
}

document.getElementById('msm-ok').addEventListener('click', confirmSm);
document.getElementById('msm-input').addEventListener('keydown', e => { if (e.key === 'Enter') confirmSm(); });

function confirmSm() {
  const inp  = document.getElementById('msm-input');
  const errEl = document.getElementById('msm-err');
  const name  = inp.value.trim();

  if (!name) {
    errEl.textContent = 'Il nome non può essere vuoto.';
    errEl.classList.add('show'); inp.focus(); return;
  }

  const dup = Object.entries(state).some(([id, sm]) => {
    if (editingSmId && id === editingSmId) return false;
    return sm.name.toLowerCase() === name.toLowerCase();
  });
  if (dup) {
    errEl.textContent = 'Esiste già un supermercato con questo nome.';
    errEl.classList.add('show'); inp.focus(); return;
  }

  if (editingSmId) {
    state[editingSmId].name = name;
    saveState(); closeModal('modal-sm'); render();
    toast(`✏ Rinominato in "${name}"`, 'info');
  } else {
    const newId = uid();
    state[newId] = { name, brand: 'custom', collapsed: false, products: [] };
    saveState(); closeModal('modal-sm'); render();
    toast(`🏪 "${name}" aggiunto!`, 'ok');
  }
}

/* ============================================================
   MODAL: DELETE SUPERMARKET
============================================================ */
let deletingSmId = null;

function openDelSm(smId) {
  deletingSmId = smId;
  const name = state[smId].name;
  document.getElementById('mdel-text').innerHTML =
    `Vuoi eliminare <strong>${esc(name)}</strong> e tutti i suoi prodotti? L'operazione non può essere annullata.`;
  openModal('modal-delsm');
}

document.getElementById('mdel-ok').addEventListener('click', function() {
  if (!deletingSmId) return;
  const name = state[deletingSmId].name;
  delete state[deletingSmId];
  saveState(); closeModal('modal-delsm'); render();
  toast(`🗑 "${name}" eliminato`, 'bad');
  deletingSmId = null;
});

  document.getElementById(id).classList.add('open');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

document.querySelectorAll('.m-overlay').forEach(ov => {
  ov.addEventListener('click', function(e) {
    if (e.target === this) closeModal(this.id);
  });
});
document.querySelectorAll('[data-close]').forEach(btn => {
  btn.addEventListener('click', function() { closeModal(this.dataset.close); });
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    document.querySelectorAll('.m-overlay.open').forEach(m => closeModal(m.id));
  }
});

/* ============================================================
   TOAST
============================================================ */
function toast(msg, type = 'ok') {
  const container = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<div class="t-dot"></div><span>${esc(msg)}</span>`;
  container.appendChild(el);
  setTimeout(() => {
    el.classList.add('out');
    el.addEventListener('animationend', () => el.remove());
  }, 2600);
}

/* ============================================================
   INIT
============================================================ */
render();
</script>
